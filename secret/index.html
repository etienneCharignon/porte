<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e74c3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Charlotte">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Charlotte</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: #f0f0f0;
    }

    img {
      width: clamp(120px, 50vmin, 400px);
      height: auto;
    }

    button {
      padding: 24px 48px;
      font-size: 1.25rem;
      font-weight: bold;
      background: #888888;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      background: #666666;
    }
  </style>
  <script>
    function envoie_requete() {
      const request = new XMLHttpRequest();
      request.open('POST', 'activate');
      request.send();
    }

    // Safari iOS requires a touchstart listener to honour :active on touch
    document.addEventListener('touchstart', function () { }, {passive: true});

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</head>

<body>
  <img src="icons/icon-512.png" alt="Charlotte">
  <button onclick="javascript:envoie_requete()">Ouvrir</button>
</body>

</html>
